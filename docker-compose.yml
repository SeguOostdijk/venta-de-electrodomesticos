
services:

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 30s

  eureka-sv:
    build: eureka-sv/eureka-sv
    container_name: eureka-sv
    ports:
      - "8761:8761"
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 40s

  config-server:
    build: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      eureka-sv:
        condition: service_healthy
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 40s

  product-service:
    build: product-service
    container_name: product-service
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-sv:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 50s
    restart: on-failure

  cart-service:
    build: cart-service
    container_name: cart-service
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-sv:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 50s
    restart: on-failure

  sale-service:
    build: sale-service
    container_name: sale-service
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8083:8083"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-sv:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 50s
    restart: on-failure

  auth-service:
    build: auth-service
    container_name: auth-service
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-sv:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 50s
    restart: on-failure

  api-gateway:
    build: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-sv:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - homeappliance-commerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 50s
    restart: on-failure

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8090:80"
    environment:
      PMA_HOSTS: mysql-db
      PMA_PORT: 3306
    networks:
      - homeappliance-commerce-net
    depends_on:
      - mysql-db

networks:
  homeappliance-commerce-net:
    driver: bridge

volumes:
  mysql_data:
server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # Auth Service - all public
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        # Product Service - public GETs
        - id: product-service-public
          uri: lb://product-service
          predicates:
            - Path=/products/**
            - Method=GET

        # Product Service - protected writes (ADMIN only)
        - id: product-service-admin
          uri: lb://product-service
          predicates:
            - Path=/products/**
            - Method=POST,PUT,DELETE
          filters:
            - JwtAuthentication=ADMIN

        # Cart Service - update quantity (PUT)
        - id: cart-service-update-quantity
          uri: lb://cart-service
          predicates:
            - Path=/carts/{cartId}/products/{productId}
            - Method=PUT
          filters:
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Role
            - JwtAuthentication=USER

        # Cart Service - authenticated (userId injected via X-User-Id header)
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/carts/**
          filters:
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Role
            - JwtAuthentication=USER

        # Sale Service - authenticated POST (create sale from cart)
        - id: sale-service-public
          uri: lb://sale-service
          predicates:
            - Path=/sales/**
            - Method=POST
          filters:
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Role
            - JwtAuthentication=USER

        # Sale Service - user's own sales (USER)
        - id: sale-service-my-sales
          uri: lb://sale-service
          predicates:
            - Path=/sales/my
            - Method=GET
          filters:
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Role
            - JwtAuthentication=USER

        # Sale Service - protected GETs and DELETE (ADMIN only)
        - id: sale-service-admin
          uri: lb://sale-service
          predicates:
            - Path=/sales/**
            - Method=GET,DELETE
          filters:
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Role
            - JwtAuthentication=ADMIN

eureka:
  client:
    service-url:
      defaultZone: http://eureka-sv:8761/eureka/

server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://mysql-db:3306/product-service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
eureka:
  client:
    service-url:
      defaultZone: http://eureka-sv:8761/eureka/
